<div class="register-root d-flex align-items-center min-vh-100">
  <c-container breakpoint="lg">
    <c-row class="justify-content-center">
      <c-col lg="6" md="8">
        <c-card class="register-card shadow-lg">
          <c-card-body class="p-4">
            <div class="logo-box text-center mb-3">
              <div class="logo">
                  <img src="assets/brand/image2.jpg" alt="CityCenter" class="logo-img" />
              </div>
              <h1 class="app-title">CityCenter Digital</h1>
            </div>

            <form (submit)="$event.preventDefault(); register(username.value, email.value, password.value, confirmPassword.value)">
              <h2>Inscription</h2>
              <p class="text-muted">Créez un compte pour accéder à CityCenter Digital.</p>

              <div class="form-floating mb-3">
                <c-input-group>
                  <span cInputGroupText><svg cIcon name="cilUser"></svg></span>
                  <input #username cFormControl type="text" placeholder="Nom d'utilisateur" autocomplete="name" />
                </c-input-group>
                <label>Nom d'utilisateur</label>
              </div>

              <div class="form-floating mb-3">
                <c-input-group>
                  <span cInputGroupText>&#64;</span>
                  <input #email cFormControl type="email" placeholder="Email" autocomplete="email" />
                </c-input-group>
                <label>Adresse email</label>
              </div>

              <div class="form-floating mb-3">
                <c-input-group>
                  <span cInputGroupText><svg cIcon name="cilLockLocked"></svg></span>
                  <input #password cFormControl type="password" placeholder="Mot de passe" autocomplete="new-password" />
                </c-input-group>
                <label>Mot de passe</label>
              </div>

              <div class="form-floating mb-3">
                <c-input-group>
                  <span cInputGroupText><svg cIcon name="cilLockLocked"></svg></span>
                  <input #confirmPassword cFormControl type="password" placeholder="Confirmer le mot de passe" autocomplete="new-password" />
                </c-input-group>
                <label>Confirmer le mot de passe</label>
              </div>

              <div class="form-check mb-3">
                <input id="terms" type="checkbox" class="form-check-input" />
                <label for="terms" class="form-check-label">
                  J'accepte les <a href="#" class="text-primary">conditions d'utilisation</a>
                </label>
              </div>

              <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
              <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

              <div class="d-grid gap-2 mb-2">
                <button cButton color="primary" (click)="register(username.value, email.value, password.value, confirmPassword.value)" [disabled]="loading" class="btn-register">
                  <span *ngIf="!loading">S'inscrire</span>
                  <span *ngIf="loading">Inscription...</span>
                </button>
              </div>

              <p class="small text-center muted mt-3">Vous avez déjà un compte ? <a routerLink="/login">Se connecter</a></p>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
